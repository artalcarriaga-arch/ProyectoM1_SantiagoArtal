<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorfly Studio</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <main>
        <h1>Colorfly Studio</h1>
        <h2>Generador de paleta de colores</h2>
        <div id="palette" role="region" aria-live="polite" aria-label="Paleta generada"></div>
        <button type="button">Generar Paleta</button>
        <label class="size-label" for="size">
            Selecciona el tamaño de la paleta
            <select id="size">
                <option value="6">6</option>
                <option value="8">8</option>
                <option value="9">9</option>
            </select>
        </label>
    </main>
</body>
</html>
